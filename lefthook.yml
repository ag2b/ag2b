commit-msg:
  commands:
    "lint commit message":
      run: npm run commitlint -- --edit {1}

pre-commit:
  piped: true
  follow: true
  jobs:
    - name: typecheck
      run: npm run typecheck

    - name: test
      run: npm run test

    - name: lint
      run: npm run lint

    - name: build
      run: npm run build
